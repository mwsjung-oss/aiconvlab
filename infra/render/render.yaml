services:
  - type: web
    name: ailab-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: MASTER_EMAIL
        sync: false
      - key: MASTER_PASSWORD
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AILAB_ENV
        value: production
      - key: AILAB_DEFAULT_RUNTIME
        value: local
      - key: AILAB_ALLOWED_RUNTIMES
        value: local,lab,cloud
      - key: OPENAI_ENABLED
        value: false
      - key: GEMINI_ENABLED
        value: false
      - key: AWS_ENABLED
        value: false

