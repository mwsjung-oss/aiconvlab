services:
  - type: web
    name: ailab-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # PostgreSQL: **External Database URL** (Internal URL은 웹 서비스에서 사용 불가)
      - key: DATABASE_URL
        sync: false
      - key: MASTER_EMAIL
        sync: false
      - key: MASTER_PASSWORD
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      # Cloudflare Pages 등 별도 도메인 SPA — 프론트 오리진(스킴+호스트, 슬래시 없음)
      - key: CORS_ORIGINS
        value: https://aiconlab.com,https://www.aiconlab.com,https://aiconvlab.com,https://www.aiconvlab.com
      - key: AILAB_ENV
        value: production
      - key: AILAB_DEFAULT_RUNTIME
        value: local
      - key: AILAB_ALLOWED_RUNTIMES
        value: local,lab,cloud
      - key: OPENAI_ENABLED
        value: false
      - key: GEMINI_ENABLED
        value: false
      - key: AWS_ENABLED
        value: false

