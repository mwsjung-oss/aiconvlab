# AWS Amplify Hosting — APS Frontend (Primary)
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # Amplify Console → App → Hosting → Environment variables 에서 동일 키 설정 (비밀 URL은 Vault/콘솔에만)
            - export VITE_API_BASE_URL="${VITE_API_BASE_URL:-}"
            - export VITE_AWS_API_URL="${VITE_AWS_API_URL:-}"
            - export VITE_DEFAULT_EXECUTION_TARGET="${VITE_DEFAULT_EXECUTION_TARGET:-aws}"
            - export VITE_ENABLE_LAB_GPU="${VITE_ENABLE_LAB_GPU:-true}"
            - export VITE_ENABLE_LLM_PROVIDER_SELECT="${VITE_ENABLE_LLM_PROVIDER_SELECT:-true}"
            - export VITE_APP_ENV="${VITE_APP_ENV:-production}"
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
