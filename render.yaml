services:
  - type: web
    name: ailab-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # PostgreSQL: Render DB 인스턴스의 **External Database URL** (Internal URL은 외부 웹 서비스에서 연결 불가)
      - key: DATABASE_URL
        sync: false
      - key: MASTER_EMAIL
        sync: false
      - key: MASTER_PASSWORD
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      # Cloudflare Pages 등 별도 도메인 SPA — 프론트 오리진(스킴+호스트, 슬래시 없음)
      # aiconvlab.com — 별도 도메인(오타·기관용). 프론트 오리진과 정확히 일치해야 CORS 통과.
      - key: CORS_ORIGINS
        value: https://aiconlab.com,https://www.aiconlab.com,https://aiconvlab.com,https://www.aiconvlab.com
      - key: AILAB_ENV
        value: production
      - key: AILAB_DEFAULT_RUNTIME
        value: local
      - key: AILAB_ALLOWED_RUNTIMES
        value: local,lab,cloud
      - key: OPENAI_ENABLED
        value: false
      - key: GEMINI_ENABLED
        value: false
      - key: AWS_ENABLED
        value: false
      # APS 운영: R2 또는 S3 버킷(대시보드에서 설정, 실제 값 필수 — 비어 두면 빌드/기동 검증 단계에서 막히게 됨).
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
