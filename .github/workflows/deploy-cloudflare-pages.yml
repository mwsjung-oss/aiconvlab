name: Deploy frontend (Cloudflare Pages — ROLLBACK / legacy only)

#
# =====================================================================
#  ROLLBACK·레거시 전용 워크플로 (Primary 운영: AWS Amplify Hosting)
#
# - Primary SPA 배포 및 DNS 전환은 docs/aws-cutover-runbook.md 를 따릅니다.
# - 과거 클라우드 스택 재가동·긴급 롤백 시에만 이 워크플로 또는 Cloudflare 연동 빌드를 사용합니다.
# - 실운영 URL과 비밀값은 레포지토리나 주석에 넣지 마세요(GitHub Secrets / Variables 이용).
# =====================================================================
#

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"

concurrency:
  group: deploy-cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy configuration (Cloudflare credentials)
        id: meta
        run: |
          missing=0
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "::notice::CLOUDFLARE_API_TOKEN not set"; missing=1; fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then echo "::notice::CLOUDFLARE_ACCOUNT_ID not set"; missing=1; fi
          if [ -z "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}" ]; then echo "::notice::CLOUDFLARE_PAGES_PROJECT_NAME not set"; missing=1; fi
          if [ "$missing" -eq 0 ]; then
            echo "do_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "do_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Rollback-only: Cloudflare Pages 자동 업로드를 켜려면 위 Secrets 저장소에 설정하세요."
          fi

      - uses: actions/setup-node@v4
        if: steps.meta.outputs.do_deploy == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Ensure frontend/.env.production (복사 또는 롤백 브랜치에 커밋)
        if: steps.meta.outputs.do_deploy == 'true'
        run: |
          f="frontend/.env.production"
          if [ ! -f "$f" ]; then
            cp frontend/.env.production.example "$f"
            echo "::notice::${f} 가 없어 .env.production.example 을 복사했습니다. 롤백 시 레거시 백엔드 HTTPS 로 반드시 편집하세요."
          fi

      # Rollback 빌드: 레거시 백엔드 호스트(URL)만 잠시 허용. Primary AWS 전환 브랜치에서는 필요 시 수동 교체 후 실행.
      - name: Verify API env keys (frontend/.env.production)
        if: steps.meta.outputs.do_deploy == 'true'
        run: |
          f="frontend/.env.production"
          if [ ! -f "$f" ]; then
            echo "::error::$f 파일이 필요합니다(AWS 진행 브랜치는 placeholder 또는 실제 값이 포함된 파일 포함)."
            exit 1
          fi
          for key in VITE_API_BASE_URL VITE_AWS_API_URL; do
            if ! grep -qE "^${key}=https://" "$f"; then
              echo "::error::$f 에 ${key}=https://... 가 필요합니다."
              exit 1
            fi
          done

      - name: Install and build frontend
        if: steps.meta.outputs.do_deploy == 'true'
        working-directory: frontend
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.meta.outputs.do_deploy == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
