# =====================================================================
# Render Deploy Hook — ROLLBACK·레거시 Backend 전용 (Primary: AWS Elastic Beanstalk)
#
# Primary 운영 트리거는 AWS 콘솔/CodePipeline/CLI 배포를 사용합니다.
# Render Auto-Deploy 또는 이 Hook 은 긴급 롤백·실험용으로만 유지합니다.
# =====================================================================
#
# Render 대시보드에서 생성한 Deploy Hook URL로 백엔드 재배포를 선택적으로 트리거합니다.
# Render가 이미 GitHub 연동 + Auto-Deploy를 쓰는 경우 이 워크플로는 비활성·Secret 비움 상태로 둘 수 있습니다.

name: Trigger backend deploy (Render hook — rollback only)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-render-backend.yml"

concurrency:
  group: render-hook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hook:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK_URL 미설정 — (롤백 비활성) Render Git 연동 자동 배포를 쓰거나, Hook URL 을 Secrets 에 추가하세요."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy hook invoked (rollback/legacy path only)."
