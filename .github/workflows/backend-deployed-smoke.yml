# Run after Render deploy (or any rollout): pins + health + login 401 + optional success.
# Use workflow_dispatch and set wait_seconds if the service is still rolling out.

name: Backend deployed smoke (manual)

on:
  workflow_dispatch:
    inputs:
      wait_seconds:
        description: "Seconds to wait before HTTP checks (e.g. Render rollout)"
        type: string
        default: "90"
        required: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SMOKE_BACKEND_URL: ${{ vars.SMOKE_BACKEND_URL || 'https://ailab-backend.onrender.com' }}
      AILAB_SMOKE_EMAIL: ${{ secrets.AILAB_SMOKE_EMAIL }}
      AILAB_SMOKE_PASSWORD: ${{ secrets.AILAB_SMOKE_PASSWORD }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest only
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Wait for rollout
        run: sleep "${{ github.event.inputs.wait_seconds || '90' }}"
      - name: Pytest pins + remote smoke
        run: python -m pytest -q tests/test_requirements_pins.py tests/test_deployed_api_smoke.py
      - name: CLI smoke
        run: python smoke_remote_checks.py
