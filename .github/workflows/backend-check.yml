name: Backend Lint Test Check

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Compile check
        run: python -m compileall -q .
      - name: Main import check
        run: python -c "import main; print(main.app.title)"
      - name: Pytest (if tests exist)
        run: |
          if ls test*.py tests/*.py 1> /dev/null 2>&1; then
            pytest -q
          else
            echo "No pytest files found. Skipping."
          fi

