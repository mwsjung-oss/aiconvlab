name: Backend Lint Test Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # GitHub Actions 변수 SMOKE_BACKEND_URL (EB 공개 HTTPS API). 미설정 시 배포 스모크는 스킵합니다.
      SMOKE_BACKEND_URL: ${{ vars.SMOKE_BACKEND_URL }}
      AILAB_SMOKE_EMAIL: ${{ secrets.AILAB_SMOKE_EMAIL }}
      AILAB_SMOKE_PASSWORD: ${{ secrets.AILAB_SMOKE_PASSWORD }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Optional wait after deploy (set SMOKE_DEPLOY_WAIT_SECONDS)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.SMOKE_DEPLOY_WAIT_SECONDS != ''
        run: sleep "${{ vars.SMOKE_DEPLOY_WAIT_SECONDS }}"

      - name: Requirements pins
        run: python -m pytest -q tests/test_requirements_pins.py

      - name: Deployed API smoke (optional)
        run: |
          if [ -z "$SMOKE_BACKEND_URL" ]; then
            echo "::notice::SMOKE_BACKEND_URL 미설정 — 배포 스모크 생략(GitHub 변수에 EB 공개 HTTPS URL 설정 시 활성화)."
            exit 0
          fi
          python -m pytest -q tests/test_deployed_api_smoke.py

      - name: CLI smoke script (optional)
        run: |
          if [ -z "$SMOKE_BACKEND_URL" ]; then
            echo "::notice::SMOKE_BACKEND_URL 미설정 — smoke_remote_checks.py 생략."
            exit 0
          fi
          python smoke_remote_checks.py

      - name: Compile check
        run: python -m compileall -q .

      - name: Main import check
        run: python -c "import main; print(main.app.title)"

      - name: Pytest (hermetic unit tests, excludes remote_smoke)
        run: |
          if ls test*.py tests/*.py 1> /dev/null 2>&1; then
            pytest -q -m "not remote_smoke"
          else
            echo "No pytest files found. Skipping."
          fi
