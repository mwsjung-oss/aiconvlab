name: Frontend Build Check

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        env:
          CI_PLACEHOLDER: ${{ vars.AWS_EB_PUBLIC_API_URL || 'https://ci-frontend-build-check.example.invalid' }}
        run: |
          export VITE_APP_ENV=production
          export VITE_API_BASE_URL="$CI_PLACEHOLDER"
          export VITE_AWS_API_URL="$CI_PLACEHOLDER"
          npm run build
